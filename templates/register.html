<!DOCTYPE html>
<html>
<head>
    <title>Register - Expense Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
    *{ margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
    body{ min-height:100vh; display:flex; justify-content:center; align-items:center; background:linear-gradient(135deg,#0f172a,#1e293b); color:white; }
    .box{ width:420px; padding:35px; background:rgba(255,255,255,0.08); backdrop-filter:blur(15px); border:1px solid rgba(255,255,255,0.1); border-radius:25px; box-shadow:0 8px 32px rgba(0,0,0,0.3); }
    .logo{ text-align:center; margin-bottom:10px; font-size:50px; }
    h1{ text-align:center; margin-bottom:10px; font-weight:600; }
    .subtitle{ text-align:center; color:#cbd5e1; margin-bottom:25px; font-size:14px; }
    input{ width:100%; padding:15px; margin-bottom:15px; border:none; outline:none; border-radius:12px; background:rgba(255,255,255,0.1); color:white; font-size:15px; }
    input::placeholder{ color:#d1d5db; }
    button{ width:100%; padding:15px; border:none; border-radius:12px; background:linear-gradient(135deg,#22c55e,#16a34a); color:white; font-size:16px; font-weight:500; cursor:pointer; transition:0.3s; }
    button:hover{ transform:translateY(-2px); }
    .error{ background:rgba(239,68,68,0.2); border:1px solid #ef4444; color:#fca5a5; padding:12px; border-radius:10px; margin-bottom:15px; text-align:center; font-size:14px; }
    .success{ background:rgba(34,197,94,0.2); border:1px solid #22c55e; color:#86efac; padding:12px; border-radius:10px; margin-bottom:15px; text-align:center; font-size:14px; }
    .footer{ text-align:center; margin-top:20px; color:#94a3b8; font-size:13px; }
    .footer a{ color:#3b82f6; text-decoration:none; font-weight:500; }
    .footer a:hover{ text-decoration:underline; }
    </style>
</head>
<body>
<div class="box">
    <div class="logo">📝</div>
    <h1>Create Account</h1>
    <p class="subtitle">Join Expense Tracker today</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    {% if success %}
    <div class="success">{{ success }}</div>
    {% endif %}

    <form method="POST">
        <input type="text" name="username" placeholder="Choose a Username" required>
        <input type="password" name="password" placeholder="Choose a Password" required>
        <input type="password" name="confirm" placeholder="Confirm Password" required>
        <button type="submit">Create Account</button>
    </form>

    <div class="footer">
        Already have an account? <a href="/">Login here</a>
    </div>
</div>
</body>
</html>
