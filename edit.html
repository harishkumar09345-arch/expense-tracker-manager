<!DOCTYPE html>
<html>
<head>
    <title>Edit Transaction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">

    <div class="navbar">
        <h2>💰 Expense Tracker</h2>
        <a href="/dashboard" class="logout-btn" style="background:linear-gradient(135deg,#3b82f6,#2563eb);">← Back</a>
    </div>

    <h1 style="margin-top:30px;">Edit Transaction</h1>

    <div class="form-box">
        <form method="POST">
            <input type="text" name="title" value="{{ expense[2] }}" required>
            <input type="number" step="0.01" name="amount" value="{{ expense[3] }}" required>
            <select name="category">
                <option {% if expense[5]=='Food' %}selected{% endif %} value="Food">Food</option>
                <option {% if expense[5]=='Travel' %}selected{% endif %} value="Travel">Travel</option>
                <option {% if expense[5]=='Shopping' %}selected{% endif %} value="Shopping">Shopping</option>
                <option {% if expense[5]=='Bills' %}selected{% endif %} value="Bills">Bills</option>
                <option {% if expense[5]=='Salary' %}selected{% endif %} value="Salary">Salary</option>
                <option {% if expense[5]=='Other' %}selected{% endif %} value="Other">Other</option>
            </select>
            <select name="type">
                <option {% if expense[4]=='Income' %}selected{% endif %} value="Income">Income</option>
                <option {% if expense[4]=='Expense' %}selected{% endif %} value="Expense">Expense</option>
            </select>
            <button type="submit">Update Transaction</button>
        </form>
    </div>

</div>
</body>
</html>
